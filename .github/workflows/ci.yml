name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        apollo-client: ["^3.8.0", "^4.0.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - name: Pin @apollo/client to ${{ matrix.apollo-client }}
        # -w targets the workspace root explicitly. Without it, pnpm in a
        # workspace refuses `add` at root with ERR_PNPM_ADDING_TO_ROOT.
        run: pnpm add -w --save-dev "@apollo/client@$APOLLO_CLIENT_VERSION" graphql@^16.8.0
        env:
          APOLLO_CLIENT_VERSION: ${{ matrix.apollo-client }}
      # Lib-only scope: the matrix row pins the root's apollo-client, which
      # would break the opposite-major test-app's tsc (its .d.ts imports
      # resolve against root). test-apps are covered by the `test` job.
      - run: pnpm test:lib
      - run: pnpm test:integration

  # On `schedule`, decide whether the nightly e2e run has anything new to
  # verify. Avoids burning CI minutes re-testing an idle repo against a
  # live third-party endpoint. Skipped on `workflow_dispatch` (manual runs
  # always proceed).
  check-changes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_recent: ${{ steps.check.outputs.has_recent }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: check
        run: |
          # Schedule fires daily. Only run e2e if HEAD has a commit newer
          # than the last schedule window (24h + 2h drift buffer).
          LATEST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE=$((NOW - LATEST))
          THRESHOLD=$((26 * 3600))
          if [ "$AGE" -lt "$THRESHOLD" ]; then
            echo "has_recent=true" >> "$GITHUB_OUTPUT"
            echo "Latest commit ${AGE}s old — running e2e"
          else
            echo "has_recent=false" >> "$GITHUB_OUTPUT"
            echo "Latest commit ${AGE}s old (> ${THRESHOLD}s) — skipping e2e"
          fi

  e2e:
    # Runs on manual dispatch always; on schedule only when check-changes
    # finds a recent commit. PR/push never run here (covered by unit tests
    # + matrix; e2e would block merges on live-endpoint flakes).
    needs: [check-changes]
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && needs.check-changes.outputs.has_recent == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e:run
        env:
          CI: "1"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  automerge:
    needs: [test, matrix]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@30c3f8f14a4f7b315ba38dbc1b793d27128fef82 # v3.12.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
